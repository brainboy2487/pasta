# module_loader.conf
# Module loader configuration for PASTA projects
# Keys are case-insensitive. Lists are semicolon-separated. Comments start with '#'.

VERSION: 1.3
MODE: Fuzzy                # Normal | Strict | Fuzzy
TREE_DEPTH: 0             # integer (0, +1, -1, +2, ...)
LOAD_TYPE: Lazy            # Normal | Lazy
CACHING: On                # On | Off
LOAD_STATE: Once           # Once | Continuous | Called
FUZZ_MATCH: 50%            # integer 50-100 (percent)
SEARCH_PATHS: src/stdlib;stdlib;libs
ALLOWED_PATHS: .;src;libs
VERBOSE: false             # true | false
SANDBOX_IO: false          # true | false
MAX_MODULE_SIZE_KB: 512    # integer (0 = no limit)
RELOAD_ON_CHANGE: false    # true | false
EXPORT_POLICY: Explicit    # Explicit | All | None
SYMBOL_ALIASING: true      # true | false
AUTO_USE_ON_FROM: true     # true | false
STRICT_NAME_NORMALIZATION: false  # true | false
LOG_LEVEL: info            # debug | info | warn | error | none
